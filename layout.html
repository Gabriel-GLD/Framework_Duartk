<style>
  /* variável para ajudar na formtação */
  :root {
    --sidebar-width: 240px;
    --header-height: 60px;
  }




  /* HEADER/ BARRA LATERAL*/
  /* Barra superior do sistema */

  .header {
    height: 60px;
    background: #fff;
    border-bottom: 1px solid var(--borda);

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 20px;

    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;

    /* box-shadow: 10px rgba(0px, 0px, 0px, 10px) */
  }

  /* LADOS */
  .header .left,
  .header .right {
    display: flex;
    align-items: center;
    gap: 12px;
  }


  /* TITULO */
  .header .title {
    font-size: 16px;
    font-weight: 600;
  }

  /* BOTÃO */
  .btn-header {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 6px;
  }


  /* MENU LATERAL DE NAVEGAÇÃO */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--cor-secundaria);
    color: white;


    position: fixed;
    top: var(--header-height);
    left: 0;

    height: calc(100vh - var(--header-height));
    transition: transform 0.3s ease;
    z-index: 1100;

    box-shadow: 8px 0 24px rgba(0, 0, 0, 0.12);
  }

  /* LINKS */
  .sidebar a {
    display: block;
    padding: 12px 16px;

    color: white;
    text-decoration: none;

    border-left: 3px solid transparent;

    transition: background 0.15s;
  }

  /* HOVER(quando o cursor está em cima) */
  .sidebar a:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  /* ATIVO */
  .sidebar a.active {
    border-left: 3px solid #fff;
    background: rgba(255, 255, 255, 0.12);
    font-weight: 600;
  }

  /* ESCONDIDA (por causa do menu "hamburguinho")*/
  .sidebar-hidden .sidebar {
    transform: translateX(-100%);
  }

  /* FIM (HEADER; BARRA LATERAL) */







  /* ===== FORMATAÇÃO PADRÃO EM *ORDEM* ===== */

  /*Área principal do conteudo */

  /*NOVO: O MAIN ORGANIZA OS CARDS AUTOMATICAMENTE */
  .main {
    padding: 20px;

    /* espaço da sidebar */
    padding-left: calc(var(--sidebar-width) + 20px);

    margin-top: var(--header-height);

    max-width: 1200px;
    width: 100%;

    margin-left: auto;
    margin-right: auto;

    max-width: min(1400px, 95vw);

    display: flex;
    flex-direction: column;
    gap: 16px;




  }

  /* quando sidebar estiver escondida */
  .sidebar-hidden .main {
    padding-left: 20px;
  }

  /* NOVO: CARD ORGANIZA TODO O CONTEUDO DENTRO */

  /* Container de padrão de conteúdos (agrupa informações e evita vazamentos)
  COLOCADO DEPOIS DAS OUTRAS FORMATAÇÕES*/

  /* NOVO: CARD PADRÃO */
  .card {
    background: var(--card);

    border: 1px solid var(--borda);
    border-radius: 6px;

    padding: 20px;
    /*16px */

    display: flex;
    flex-direction: column;
    gap: 16px;

    box-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
  }

  /* FIM CARD */




  /* NOVO: FORM-GROUP, PARA AGRUPAR INPUTS, SELECTS, CEHCKBOX E ATÉ TABELAS DEIXANDO ELES RESPONSIVOS  */

  /* FORMATAÇÃO PARA SE UTILIZAR de acordo com as especificações acima*/
  .form-group {
    display: flex;
    flex-direction: column;

    width: 100%;
    gap: 10px;

    /* padding: 4px 0; */
  }

  /* LABEL padrão */
  .form-group label {
    font-size: 13px;
    font-weight: 500;
    color: var(--texto);
  }

  /* INPUTS, SELECTS, TEXTAREA */
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;

    padding: 10px 12px;

    border: 1px solid var(--borda);
    border-radius: 6px;

    background: var(--bg);
    color: var(--texto);

    font-size: 14px;
  }


  /* CHECKBOX (auto ajuste sem classe extra) */
  .form-group input[type="checkbox"] {
    width: auto;
    margin-right: 6px;
  }

  /* Se tiver checkbox + label, alinhar */
  .form-group:has(input[type="checkbox"]) {
    flex-direction: row;
    align-items: center;
    gap: 8px;
  }

  /* TABELAS dentro do form-group */
  .form-group table {
    width: 100%;
    border-collapse: collapse;
  }

  /* Scroll automático para tabelas grandes */
  .form-group:has(table) {
    overflow-x: auto;
  }

  /* FEEDBACK (opcional) */
  .form-group .feedback {
    font-size: 12px;
    color: var(--muted);
  }

  /* FIM FORM-GROUP */

  /* FIM FORMATAÇÃO PADRÃO*/





  /*PADRÃO DE LAYOUT SÓ PARA FILTROS, PRINCIPALMENTE CHECKBOX E SELECTS E SEUS AGRUPAMENTOS */

  /* COLOCA OS ITENS UM ABAIXO DO OUTRO*/
  .filter-options {


    display: flex;

    flex-direction: column;

    gap: 12px;




    /* display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    margin-top: 8px; */
  }

  .filter-title {

    font-size: 14px;

    font-weight: 600;

    margin: 0;




    /* font-weight: 700;
    margin-bottom: 8px; */
  }


  /* ===== AJUDAS DE FORMATAÇÃO ===== */
  /* espaçamento vertical */
  .mt-1 {
    margin-top: 10px;
  }

  .mt-2 {
    margin-top: 20px;
  }

  /* Ativa a flexbox rapidamente */
  .flex {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* distribui os elementos com espaço entre eles (Formatação) */
  .space-between {
    justify-content: space-between;
  }

  /* FIM (AJUDAS DE FORMATAÇÃO) */






  /* ===== RESPONSIVIDADE entre telas maiores ou menores ===== */

    .main {

  }

  @media (max-width: 1200px) {
    .sidebar {
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .main {
      padding-left: 20px;
    }
  } */


  @media (max-width: 1030px) {

    .sidebar {

      transform: translateX(-100%);

      width: 260px;

      z-index: 2000;

      box-shadow: 2px 0 12px rgba(0, 0, 0, 0.2);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .main {

      padding-left: 20px;

      padding-right: 20px;

      width: 100%;

      max-width: 100%;
    }
  }




  @media (max-width: 900px) {

    .sidebar {
      width: 260px;


      transform: translateX(-100%);
      transition: transform 0.3s ease;

      box-shadow: 2px 0 12px rgba(0, 0, 0, 0.2);
      /* efeito overlay */
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .main {
      padding-left: 20px;
    }
  }

  @media (max-width: 600px) {
    .main {
      padding: 16px;
    }

    .card {
      padding: 14px;
      gap: 12px;
    }

    .button.block {
      width: 100%;
    }

  }

  /* FIM (RESPONSIVIDADE) */
